name: Auto Mock Test Video Maker

on:
  schedule:
    - cron: '0 3 * * *'   # सुबह 08:30 AM IST (03:00 UTC)
    - cron: '0 15 * * *'  # रात 08:30 PM IST (15:00 UTC)
  workflow_dispatch: 

jobs:
  run-mock-test-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          if [ -d "ai_backend" ]; then cd ai_backend && npm install --legacy-peer-deps || true; fi

      - name: Generate Mock Test Video
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          TTS_KEY_JSON: ${{ secrets.TTS_KEY_JSON }}
          GMAIL_CREDENTIALS: ${{ secrets.GMAIL_CREDENTIALS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node ai_backend/mock_test_video.js
