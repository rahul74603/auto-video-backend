name: Daily Job Expiry Alert

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  send_alerts:
    runs-on: ubuntu-latest
    
    # 👇 यह लाइन GitHub को ai_backend फोल्डर के अंदर ले जाएगी
    defaults:
      run:
        working-directory: ai_backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Run Daily Alert
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # अब यह ai_backend के अंदर से ही require करेगा
        run: node -e 'require("./daily_alert.js").runDailyAlert().then(() => process.exit(0)).catch(e => { console.error(e); process.exit(1); })'