name: Auto Mock Test Generator

on:
  schedule:
    # GitHub UTC टाइम पर चलता है (IST = UTC + 5:30)
    # 30 3,6,9,12,15 * * * (UTC) का मतलब है भारतीय समय अनुसार:
    # सुबह 9:00, दोपहर 12:00, 3:00, शाम 6:00, और रात 9:00
    - cron: '30 3,6,9,12,15 * * *'
  workflow_dispatch: # बटन दबाकर मैन्युअली रन करने के लिए

jobs:
  generate-mock-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Packages
        # अगर आपके फोल्डर का नाम ai_backend है, तो इसे ऐसा ही रहने दें
        run: |
          cd ai_backend
          npm install firebase-admin @google/generative-ai axios dotenv

      - name: Run Auto Mock Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          cd ai_backend
          node auto_mock.js
