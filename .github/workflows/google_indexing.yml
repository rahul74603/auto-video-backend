name: StudyGyaan Daily Google Indexing 🚀

on:
  schedule:
    # 🕒 रात 9:00 PM IST (15:30 UTC) पर रोज़ाना चलेगा
    - cron: '30 15 * * *'
  
  workflow_dispatch:

jobs:
  run-indexing:
    runs-on: ubuntu-latest

    # 👇 यह सुनिश्चित करता है कि सभी कमांड्स ai_backend फोल्डर के अंदर चलें
    defaults:
      run:
        working-directory: ai_backend

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🚀 Run Indexing Script
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: node google_indexing.js